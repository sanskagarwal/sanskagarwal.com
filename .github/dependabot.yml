# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
# Routine version bumps are disabled (open-pull-requests-limit: 0).
# Dependabot still raises PRs for real security vulnerabilities — those
# ignore this limit and require "Dependabot security updates" enabled in
# the repository's security settings.
updates:
  - package-ecosystem: "npm"
    directory: "./src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "./functions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "./content"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
