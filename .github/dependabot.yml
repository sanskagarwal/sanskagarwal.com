# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "./src"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "./functions"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "./content"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "./notes-llm"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
