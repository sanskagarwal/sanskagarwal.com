name: Deploy CMS Backend

on:
    # Auto-deploy on push disabled during testing; run manually from the Actions tab.
    # push:
    #     branches: ["main"]
    #     paths:
    #         - content/**
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    build-and-deploy:
        uses: ./.github/workflows/deploy-app.yml
        with:
            package-path: "content"
            app-name: "sanskagarwal-cms"
            deploy-type: "webapp"
            node-version: "24.x"
        secrets: inherit
