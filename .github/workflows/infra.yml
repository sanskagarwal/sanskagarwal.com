name: Deploy Infrastructure

on:
    # Auto-deploy on push disabled during testing; run manually from the Actions tab.
    # push:
    #     branches: ["main"]
    #     paths:
    #         - infra/**
    workflow_dispatch:

env:
    RESOURCE_GROUP: website
    LOCATION: centralindia

permissions:
    contents: read
    id-token: write

jobs:
    deploy-infra:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: "Checkout GitHub Action"
              uses: actions/checkout@v6

            - name: "Azure login (OIDC)"
              uses: azure/login@v3
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: "Validate (what-if)"
              uses: azure/cli@v3
              env:
                  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
                  TANDOOR_TOKEN: ${{ secrets.TANDOOR_TOKEN }}
                  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
                  DATABASE_CMS_PASSWORD: ${{ secrets.DATABASE_CMS_PASSWORD }}
                  STRAPI_APP_KEYS: ${{ secrets.STRAPI_APP_KEYS }}
                  STRAPI_API_TOKEN_SALT: ${{ secrets.STRAPI_API_TOKEN_SALT }}
                  STRAPI_ADMIN_JWT_SECRET: ${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
                  STRAPI_TRANSFER_TOKEN_SALT: ${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}
                  STRAPI_JWT_SECRET: ${{ secrets.STRAPI_JWT_SECRET }}
              with:
                  azcliversion: latest
                  inlineScript: |
                      az deployment group what-if \
                        --resource-group "$RESOURCE_GROUP" \
                        --template-file infra/main.bicep \
                        --parameters infra/main.bicepparam

            - name: "Deploy Bicep"
              uses: azure/cli@v3
              env:
                  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
                  TANDOOR_TOKEN: ${{ secrets.TANDOOR_TOKEN }}
                  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
                  DATABASE_CMS_PASSWORD: ${{ secrets.DATABASE_CMS_PASSWORD }}
                  STRAPI_APP_KEYS: ${{ secrets.STRAPI_APP_KEYS }}
                  STRAPI_API_TOKEN_SALT: ${{ secrets.STRAPI_API_TOKEN_SALT }}
                  STRAPI_ADMIN_JWT_SECRET: ${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
                  STRAPI_TRANSFER_TOKEN_SALT: ${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}
                  STRAPI_JWT_SECRET: ${{ secrets.STRAPI_JWT_SECRET }}
              with:
                  azcliversion: latest
                  inlineScript: |
                      az deployment group create \
                        --resource-group "$RESOURCE_GROUP" \
                        --template-file infra/main.bicep \
                        --parameters infra/main.bicepparam
